name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: swift test
  brew:
    runs-on: macos-26
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v4
      - run: echo "HOMEBREW_SWIFT=$(xcrun --find swift)" >> "$GITHUB_ENV"
      - run: |
          git switch -c ci-under-test
          sed -i '' 's|^  head .*|  head "file://'"$GITHUB_WORKSPACE"'", using: :git, branch: "ci-under-test"|' Formula/sand.rb
      - run: brew trust cirruslabs/cli aws/tap
      - run: brew tap cirruslabs/cli
      - run: brew tap-new local/sand
      - run: cp Formula/sand.rb "$(brew --repo local/sand)/Formula/sand.rb"
      - run: brew install --HEAD local/sand/sand
      - run: brew test local/sand/sand
